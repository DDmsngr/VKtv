name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.x'
          channel: 'stable'
          cache: true

      # gradle-wrapper.jar обычно в .gitignore — берём из свежего scaffold.
      # НИЧЕГО ДРУГОГО НЕ ТРОГАЕМ, особенно settings.gradle и build.gradle —
      # они нужны Gradle чтобы понять layout проекта.
      - name: Restore gradle-wrapper.jar
        run: |
          if [ ! -f android/gradle/wrapper/gradle-wrapper.jar ]; then
            TMP=$(mktemp -d)
            flutter create --project-name _dummy --org _.dummy "$TMP/scaffold"
            cp "$TMP/scaffold/android/gradle/wrapper/gradle-wrapper.jar" \
               android/gradle/wrapper/gradle-wrapper.jar
            rm -rf "$TMP"
          fi

      # local.properties нужен ТОЛЬКО в android/, больше нигде.
      - name: Write local.properties
        run: |
          FLUTTER_SDK=$(dirname $(dirname $(which flutter)))
          echo "flutter.sdk=$FLUTTER_SDK" > android/local.properties

      - name: Show diagnostic info
        run: |
          echo "--- pubspec.yaml ---"
          cat pubspec.yaml
          echo "--- android/settings.gradle ---"
          cat android/settings.gradle
          echo "--- android/build.gradle ---"
          cat android/build.gradle
          echo "--- android/app/build.gradle ---"
          cat android/app/build.gradle
          echo "--- AndroidManifest flutterEmbedding ---"
          grep -A1 "flutterEmbedding" android/app/src/main/AndroidManifest.xml \
            || echo "WARNING: flutterEmbedding meta-data not found"
          echo "--- MainActivity.kt ---"
          cat android/app/src/main/kotlin/ru/vktv/app/MainActivity.kt

      - name: Flutter pub get
        run: flutter pub get

      - name: Analyze (non-blocking)
        run: flutter analyze --no-fatal-infos
        continue-on-error: true

      - name: Build debug APK
        run: flutter build apk --debug --target-platform android-arm64

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: vk-tv-debug
          path: build/app/outputs/apk/debug/app-debug.apk
          retention-days: 14
