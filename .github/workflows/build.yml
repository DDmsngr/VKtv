name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.x'
          channel: 'stable'
          cache: true

      - name: Setup project
        run: |
          FLUTTER_SDK=$(which flutter | sed 's|/bin/flutter||')

          # Создаём scaffold во временную папку
          flutter create --project-name vk_tv --org ru.vktv /tmp/scaffold

          # Копируем gradle wrapper jar
          cp /tmp/scaffold/android/gradle/wrapper/gradle-wrapper.jar \
             android/gradle/wrapper/

          # Убираем дублирующие android-level файлы — Flutter использует корневые
          rm -f android/settings.gradle
          rm -f android/build.gradle

          # local.properties в обоих местах
          echo "flutter.sdk=$FLUTTER_SDK" > local.properties
          echo "flutter.sdk=$FLUTTER_SDK" > android/local.properties

          # Проверяем что наш MainActivity на месте
          echo "--- MainActivity.kt ---"
          cat android/app/src/main/kotlin/ru/vktv/app/MainActivity.kt

          # Проверяем манифест на flutterEmbedding
          echo "--- AndroidManifest ---"
          grep -A1 "flutterEmbedding" android/app/src/main/AndroidManifest.xml || echo "WARNING: flutterEmbedding not found!"

      - name: Get dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos
        continue-on-error: true

      - name: Build debug APK
        run: flutter build apk --debug --target-platform android-arm64 --no-shrink

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: vk-tv-debug
          path: build/app/outputs/apk/debug/app-debug.apk
          retention-days: 14
