name: Build APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.x'
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Run code generation
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Analyze
        run: flutter analyze --no-fatal-infos

      - name: Build APK (debug)
        run: flutter build apk --debug --target-platform android-arm64

      - name: Build APK (release)
        run: flutter build apk --release --target-platform android-arm64
        # Для release нужен signing — раскомментировать когда будет keystore:
        # env:
        #   KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
        #   KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        #   KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        #   KEY_PATH: ${{ secrets.KEY_PATH }}

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: vk-tv-debug
          path: build/app/outputs/apk/debug/app-debug.apk
          retention-days: 14

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: vk-tv-release
          path: build/app/outputs/apk/release/app-release-unsigned.apk
          retention-days: 14

      # Создаём GitHub Release при пуше тега v*
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/app/outputs/apk/debug/app-debug.apk
            build/app/outputs/apk/release/app-release-unsigned.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
