name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.x'
          channel: 'stable'
          cache: true

      - name: Scaffold missing Flutter files
        run: |
          flutter create --project-name vk_tv --org ru.vktv /tmp/scaffold
          cp -rn /tmp/scaffold/android/gradle/wrapper/gradle-wrapper.jar android/gradle/wrapper/ 2>/dev/null || true
          echo "flutter.sdk=$(which flutter | sed 's|/bin/flutter||')" > android/local.properties

      - name: Debug gradle files
        run: |
          find . -name "*.gradle" | xargs grep -l "shrinkResources" 2>/dev/null || echo "shrinkResources not found"
          find . -name "*.gradle" | xargs grep -l "shrink" 2>/dev/null || echo "shrink not found"
          cat android/app/build.gradle
          cat android/gradle.properties

      - name: Get dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos
        continue-on-error: true

      - name: Build debug APK
        run: flutter build apk --debug --target-platform android-arm64

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: vk-tv-debug
          path: build/app/outputs/apk/debug/app-debug.apk
          retention-days: 14
