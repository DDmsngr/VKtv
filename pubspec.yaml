name: vk_tv
description: Open-source VK video client for Android TV
publish_to: none
version: 0.1.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  flutter_riverpod: ^2.5.1
  go_router: ^13.0.0

  media_kit: ^1.1.10
  media_kit_video: ^1.2.4
  media_kit_libs_android_video: ^1.3.2

  flutter_inappwebview: ^6.1.5

  http: ^1.2.1
  shared_preferences: ^2.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

# Транзитивные зависимости media_kit_video обновились до версий,
# требующих Flutter 3.35+ (новый plugin loader). Мы на 3.24 — пиним.
dependency_overrides:
  package_info_plus: ^8.0.2
  wakelock_plus: ^1.2.8
  screen_brightness_android: ^0.1.0

flutter:
  uses-material-design: true
