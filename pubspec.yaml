name: vk_tv
description: Open-source VK video client for Android TV
publish_to: none
version: 0.1.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management — НЕ используем riverpod_annotation/generator
  # чтобы избежать проблем с build_runner
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^13.0.0

  # Video playback
  media_kit: ^1.1.10
  media_kit_video: ^1.2.4
  media_kit_libs_android_video: ^1.3.2

  # WebView для авторизации VK
  flutter_inappwebview: ^6.0.0

  # Networking
  http: ^1.2.1

  # Cache & storage
  shared_preferences: ^2.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  # build_runner НЕ нужен — убрали riverpod_generator

flutter:
  uses-material-design: true
